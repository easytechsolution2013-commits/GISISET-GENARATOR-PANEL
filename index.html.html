<!DOCTYPE html>
<html>
<head>
    <title>GenSet Pro Live Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* જૂની CSS અહિયાં બેઠી કોપી કરેલી છે */
        body{font-family:Sans-Serif; text-align:center; background:#121212; color:white; margin:0; padding:10px;}
        .flex{display:flex; flex-wrap:wrap; justify-content:center; gap:10px;}
        .card{background:#1e1e1e; padding:15px; border-radius:12px; width:300px; border-top:8px solid #444;}
        .r{border-color:#ff3333;} .y{border-color:#ffcc00;} .b{border-color:#3366ff;}
        .val{font-size:22px; font-weight:bold;}
        .box{background:#222; margin:15px auto; padding:15px; border-radius:10px; max-width:500px; border:1px solid #444;}
        .btn{padding:12px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; width:90%; font-weight:bold; margin-top:10px;}
        .hidden { display: none !important; }
        .login-card { background: #1a1a1a; padding: 40px; border-radius: 20px; max-width: 400px; margin: 100px auto; border: 2px solid #444; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        input { padding: 15px; margin: 10px 0; width: 90%; background: #333; color: white; border: 1px solid #555; border-radius: 10px; font-size: 16px; }
        .st-item { font-weight: bold; font-size: 19px; padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; color: white; }
    </style>
</head>
<body>

<!-- ૧. લોગિન વિભાગ -->
<div id="loginSection" class="login-card">
    <h2 style="color:#00ffcc">🔒 SYSTEM ACCESS</h2>
    <p>Enter Device ID & Password to Start</p>
    <input type="text" id="inputID" placeholder="Unique ID (e.g. 871C20...)">
    <input type="password" id="inputPass" placeholder="Secret Password">
    <button class="btn" onclick="login()">LOGIN TO DASHBOARD</button>
    <p style="color: #666; font-size: 12px; margin-top: 20px;">New device? Try default: 123456</p>
</div>

<!-- ૨. મેઈન ડેશબોર્ડ -->
<div id="dashboardSection" class="hidden">
    <div class="box" style="border: none; background: linear-gradient(145deg, #1a1a1a, #222);">
        <h2 id="devTitle" style="color:#00ffcc">DEVICE: --</h2>
    </div>

    <div class="flex">
        <div class="card r"><h3>PHASE R</h3><div class="val" id="vr">0V</div><div class="val" id="ir">0A</div></div>
        <div class="card y"><h3>PHASE Y</h3><div class="val" id="vy">0V</div><div class="val" id="iy">0A</div></div>
        <div class="card b"><h3>PHASE B</h3><div class="val" id="vb">0V</div><div class="val" id="ib">0A</div></div>
    </div>

    <div class="box">
        <h3 style="color:#00ff00">ENGINE STATUS</h3>
        <div class="st-item">BATT LEVEL: <span id="stBatt">--</span></div>
        <div class="st-item">OIL PRESSURE: <span id="stOil">--</span></div>
        <div class="st-item">DIESEL TANK: <span id="stDsl">--</span></div>
        <div class="st-item">TEMPERATURE: <span id="stTemp">--</span></div>
        <div class="st-item">GEN ON/OFF: <span id="stIsOn">--</span></div>
    </div>

    <div style="margin: 20px;">
        <button class="btn" style="background:#e74c3c; width: 150px;" onclick="location.reload()">LOGOUT</button>
    </div>
</div>

<!-- Firebase Script -->
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    // તમારી Firebase વિગતો
    const firebaseConfig = {
        apiKey: "XNEjyhB6iMejcjTLJqWJHsp2FdnaQxECz4gmP7OV", // આ તમારો સિક્રેટ છે
    databaseURL: "https://genrator-4f0c3-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        const id = document.getElementById('inputID').value.toUpperCase();
        const pass = document.getElementById('inputPass').value;

        if(!id || !pass) { alert("Please fill ID and Password"); return; }

        db.ref("Devices/" + id + "/config/password").once("value").then((snapshot) => {
            if (snapshot.exists() && snapshot.val() === pass) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('devTitle').innerText = "ID: " + id;
                startLive(id);
            } else {
                alert("Incorrect Credentials!");
            }
        });
    }

    function startLive(deviceID) {
        // આ ફંક્શન હવે ઓટોમેટિક ડેટા અપડેટ કરશે
        db.ref("Devices/" + deviceID + "/live").on("value", (snapshot) => {
            const d = snapshot.val();
            if(!d) return;

            // ડેટા અપડેટ (તમારું જૂનું document.getElementById લોજિક)
            document.getElementById('vr').innerText = (d.vr || 0) + 'V';
            document.getElementById('ir').innerText = (d.ir || 0) + 'A';
            document.getElementById('vy').innerText = (d.vy || 0) + 'V';
            document.getElementById('iy').innerText = (d.iy || 0) + 'A';
            document.getElementById('vb').innerText = (d.vb || 0) + 'V';
            document.getElementById('ib').innerText = (d.ib || 0) + 'A';
            
            document.getElementById('stBatt').innerText = (d.bt || 0) + '%';
            document.getElementById('stOil').innerText = d.os || "OK";
            document.getElementById('stDsl').innerText = (d.dp || 0) + '%';
            document.getElementById('stTemp').innerText = (d.td || 0) + '°C';
            document.getElementById('stIsOn').innerText = d.isOn == 1 ? "RUNNING" : "STOPPED";
            document.getElementById('stIsOn').style.color = d.isOn == 1 ? "#00ff00" : "#ff3333";
        });
    }
</script>
</body>
</html>
